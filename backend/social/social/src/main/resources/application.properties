# App name
spring.application.name=social

# MySQL connection \u2014 change Username/password to yours
spring.datasource.url=jdbc:mysql://localhost:3306/socialhub_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=bidda
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8080
spring.mvc.pathmatch.use-suffix-pattern=false
